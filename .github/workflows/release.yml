name: release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write
    id-token: write

jobs:
    build-and-publish:
        name: Build and publish to PyPI
        runs-on: ubuntu-latest
        environment:
            name: pypi
        steps:
            - uses: actions/checkout@v5

            - name: Install uv
              uses: astral-sh/setup-uv@v6

            - name: Bump version
              run: uv version --bump patch

            - name: Build wheel and sdist
              run: uv build

            - name: Publish
              run: uv publish
              env:
                  UV_PUBLISH_TOKEN: ${{ secrets.UV_PUBLISH_TOKEN }}
